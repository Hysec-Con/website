<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HysecCon 2026 - Hyderabad Security Conference</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            padding: 1.5rem;
            max-width: 600px;
            position: relative;
            z-index: 10;
        }

        .coming-soon {
            font-size: 0.875rem;
            color: #00d4ff;
            margin-bottom: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        h1 {
            font-size: clamp(2rem, 10vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.1;
            background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.2s forwards;
        }

        .location {
            font-size: clamp(1rem, 4vw, 1.25rem);
            color: #888;
            margin-bottom: 2rem;
            font-weight: 500;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.4s forwards;
        }

        .description {
            font-size: clamp(1rem, 3vw, 1.125rem);
            line-height: 1.7;
            color: #ccc;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.6s forwards;
        }

        .register-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: clamp(1rem, 3vw, 1.125rem);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.8s forwards;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        .register-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.5);
        }

        .register-btn:active {
            transform: translateY(-1px);
        }

        .date {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #666;
            opacity: 0;
            animation: fadeInUp 0.8s ease 1s forwards;
        }

        .highlight {
            color: #00d4ff;
            font-weight: 600;
        }

        .cyber-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.05;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
        }

        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .float-element {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00d4ff;
            border-radius: 50%;
            opacity: 0.6;
            animation: float 20s infinite linear;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            
            .register-btn {
                padding: 0.875rem 2rem;
            }
        }

        /* Modal styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #0a0a0a 100%);
            padding: 2.5rem;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            border: 1px solid #00d4ff;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-title {
            color: #00d4ff;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .modal-text {
            color: #ccc;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .email-input {
            width: 100%;
            padding: 1rem;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            transition: border-color 0.3s ease;
        }

        .email-input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
        }

        .modal-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
            color: #000;
        }

        .modal-btn-secondary {
            background: transparent;
            color: #888;
            border: 1px solid #333;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
        }

        .success-message {
            text-align: center;
        }

        .success-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="floating-elements" id="floatingElements"></div>
    
    <div class="container">
        <div class="coming-soon">Coming Soon</div>
        <h1>HysecCon 2026</h1>
        <p class="location">📍 Hyderabad, India</p>
        <p class="description">
            The <span class="highlight">premier cybersecurity conference</span> is coming to Hyderabad. 
            Join industry leaders, security researchers, and tech enthusiasts for 
            an unforgettable experience in digital security.
        </p>
        
        <a href="https://forms.gle/a1vxxK7z7hAia7Ts5" target="_blank" class="register-btn">Register Your Interest</a>
        
        <div class="date">
            Late 2026 • Be the first to know
        </div>
    </div>

    <script>
        // Create floating elements
        function createFloatingElements() {
            const container = document.getElementById('floatingElements');
            const elementCount = 30;
            
            for (let i = 0; i < elementCount; i++) {
                const element = document.createElement('div');
                element.className = 'float-element';
                element.style.left = Math.random() * 100 + '%';
                element.style.animationDelay = Math.random() * 20 + 's';
                element.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(element);
            }
        }

        // Initialize on load
        window.addEventListener('load', createFloatingElements);
    </script>
</body>
</html>
